<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Simple Shopping Site</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>My Shopping Store</h1>
    <div class="cart-summary">
      Cart: <span id="cart-count">0</span> items | ₹<span id="cart-total">0</span>
      <button id="checkout-btn">Checkout</button>
    </div>
  </header>

  <main class="products">
    <!-- Product 1 -->
    <div class="product">
      <img src="https://via.placeholder.com/150" alt="Product 1" />
      <h3>Wireless Earbuds</h3>
      <p class="price">₹1,299</p>
      <button class="add-to-cart-btn" data-name="Wireless Earbuds" data-price="1299">Add to Cart</button>
    </div>

    <!-- Product 2 -->
    <div class="product">
      <img src="https://via.placeholder.com/150" alt="Product 2" />
      <h3>Smart Watch</h3>
      <p class="price">₹2,499</p>
      <button class="add-to-cart-btn" data-name="Smart Watch" data-price="2499">Add to Cart</button>
    </div>

    <!-- Product 3 -->
    <div class="product">
      <img src="https://via.placeholder.com/150" alt="Product 3" />
      <h3>Bluetooth Speaker</h3>
      <p class="price">₹999</p>
      <button class="add-to-cart-btn" data-name="Bluetooth Speaker" data-price="999">Add to Cart</button>
    </div>

    <!-- Product 4 -->
    <div class="product">
      <img src="https://via.placeholder.com/150" alt="Product 4" />
      <h3>Power Bank</h3>
      <p class="price">₹799</p>
      <button class="add-to-cart-btn" data-name="Power Bank" data-price="799">Add to Cart</button>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
